# Alembic Configuration
#
# This file configures Alembic for database migrations.
#
# Alembic is a database migration tool for SQLAlchemy.
# It tracks schema changes and applies them incrementally.
#
# Usage:
#   alembic init alembic           # Initialize (already done)
#   alembic revision --autogenerate -m "message"  # Create migration
#   alembic upgrade head           # Apply all migrations
#   alembic downgrade -1           # Rollback one migration
#   alembic history                # Show migration history
#   alembic current                # Show current revision
#
# The script_location points to the migrations directory.
# sqlalchemy.url is overridden in env.py to use settings.
#
# For full documentation, see: https://alembic.sqlalchemy.org/

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Template for generated migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Set to 'true' to run in "offline" mode
# offline = false

# sqlalchemy.url is loaded from environment in env.py
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Run black on migrations after generation
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
